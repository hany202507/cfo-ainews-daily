name: daily

on:
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build outputs without posting to Slack)"
        type: boolean
        default: false
      force:
        description: "Force-continue past RSS half-failure abort threshold"
        type: boolean
        default: false

permissions:
  contents: write  # required to commit state updates back to data/

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure git identity
        run: |
          git config user.name  "cfo-ainews-bot"
          git config user.email "cfo-ainews-bot@users.noreply.github.com"

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.force }}"  = "true" ]; then ARGS="$ARGS --force";   fi
          python -m scripts.main $ARGS

      - name: Upload daily artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-${{ github.run_id }}
          path: outputs/daily/
          if-no-files-found: ignore
          retention-days: 14
