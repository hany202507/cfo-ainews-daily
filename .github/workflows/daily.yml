name: daily

on:
  schedule:
    # 22:00 UTC = 07:00 KST → CFO digest
    - cron: "0 22 * * *"
    # Gridie digest auto-send disabled per user request (CFO-only).
    # Still runnable manually via workflow_dispatch (digest: gridie).
  workflow_dispatch:
    inputs:
      digest:
        description: "Which digest to run"
        type: choice
        options:
          - cfo
          - gridie
        default: cfo
      dry_run:
        description: "Dry run (build outputs without posting to Slack)"
        type: boolean
        default: false
      force:
        description: "Force-continue past RSS half-failure abort threshold"
        type: boolean
        default: false

permissions:
  contents: write  # required to commit state updates back to data/

concurrency:
  # Per-digest concurrency so 7am CFO and 8am Gridie can run independently
  group: daily-${{ github.event.inputs.digest || (github.event.schedule == '0 23 * * *' && 'gridie' || 'cfo') }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure git identity
        run: |
          git config user.name  "cfo-ainews-bot"
          git config user.email "cfo-ainews-bot@users.noreply.github.com"

      - name: Determine digest type from trigger
        id: d
        run: |
          # Manual dispatch wins; otherwise route by cron schedule.
          if [ -n "${{ github.event.inputs.digest }}" ]; then
            DIGEST="${{ github.event.inputs.digest }}"
          elif [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            DIGEST="gridie"
          else
            DIGEST="cfo"
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: $DIGEST"

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          ARGS="--digest=${{ steps.d.outputs.digest }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.force }}"  = "true" ]; then ARGS="$ARGS --force";   fi
          python -m scripts.main $ARGS

      - name: Upload daily artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-${{ steps.d.outputs.digest }}-${{ github.run_id }}
          path: outputs/daily/
          if-no-files-found: ignore
          retention-days: 14
